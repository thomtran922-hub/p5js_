<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My p5.js Visual Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
    body { background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2.2rem; color: #2c3e50; font-weight: 700; margin-bottom: 8px; }
    header p { font-size: 1.1rem; color: #7f8c8d; }
    #projects { display: grid; grid-template-columns: 1fr 1fr; width: 100%; max-width: 1000px; gap: 24px; margin-bottom: 40px; }
    .card { background: #ffffff; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.06); overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
    .card-title { background-color: #2c3e50; color: #ffffff; padding: 12px 16px; font-size: 1rem; font-weight: 700; text-align: center; letter-spacing: 1px; }
    .iframe-container { aspect-ratio: 16 / 10; position: relative; overflow: hidden; background-color: #e9ecef; }
    .iframe-container iframe { width: 100%; height: 100%; border: none; }
    footer p { font-size: 0.9rem; color: #bdc3c7; }
  </style>
</head>
<body>

  <header>
    <h1>나의 p5.js 비주얼 포트폴리오</h1>
    <p>Creative Coding Projects - Visual Portfolio</p>
  </header>

  <main id="projects">
    <div class="card">
      <div class="card-title">과제 1 (정적)</div>
      <div class="iframe-container">
        <iframe src="https://editor.p5js.org/thomtran922/embed/E8hOB_jV4"></iframe>
      </div>
    </div>
    <div class="card">
      <div class="card-title">과제 4 (동적)</div>
      <div class="iframe-container">
        <iframe src="https://editor.p5js.org/thomtran922/embed/_am60jDX7"></iframe>
      </div>
    </div>
    <div class="card">
      <div class="card-title">과제 2 (정적)</div>
      <div class="iframe-container">
        <iframe src="https://editor.p5js.org/thomtran922/embed/yXuv3hYaD"></iframe>
      </div>
    </div>
    <div class="card">
      <div class="card-title">과제 3 (동적)</div>
      <div class="iframe-container">
        <iframe src="https://editor.p5js.org/thomtran922/embed/DiALtvCDx"></iframe>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 p5.js Visual Portfolio.</p>
  </footer>

</body>
</html>
